<!DOCTYPE html>
<html>

<body onload="startTime(); checkMessage();">

<h5>Block Block</h5>

<div id="clock" style="font-size: 48px;"></div>
<div id="txt" style ="font-size: 30px;"></div>


<script>
  //reminder to add an arraylist of jolly messages 
  var funmessage = "test hello yes";
function startTime() { //the function checks the current time and displays it once.
  const today = new Date(); //gets the current date and time.
  let h = today.getHours(); //gets the hours of today
  let m = today.getMinutes(); //gets the minutes of today
  let s = today.getSeconds(); //gets the seconds of today.
  m = checkTime(m); 
  s = checkTime(s);
  document.getElementById('clock').innerHTML =  h + ":" + m + ":" + s;
  setTimeout(startTime, 1000); //repeats this every second after you open the page.
}

function checkTime(i) { //makes the numbers viewable in a clock way without looking ugly
  if (i < 10) {i = "0" + i};  // add zero in front of numbers < 10
  return i;
}

function checkMessage(){ //checks the current messsage of the day.
    const today = new Date(); //gets the current date and time.
  let h = today.getHours(); //gets the hours of today
  let m = today.getMinutes(); //gets the minutes of today
  let s = today.getSeconds(); //gets the seconds of today.
  if (h<8){ //if the time is less than 8 am
    funmessage = "good morning"; 
  } else if (h>=8 && m>=25){ //if hours are past 8 and minutes are >25, first period has begun
    funmessage = "start of the day, good luck!"; 
  } else if (h>=9 && m>=30 ){ //second half of 1st period
    funmessage = "keep going, just a bit longer."; 
  }
  m = checkTime(m); 
  s = checkTime(s);
  document.getElementById('txt').innerHTML = funmessage;
  setTimeout(startTime, 1000); //checking every second after you open the page.
}
</script>

</body>
</html>
