<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Head-Royce Live Display</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark:  #1a4228;
    --green:       #1d5c34;
    --green-mid:   #2a7048;
    --green-light: #d4ead9;
    --gold:        #f5c800;
    --gold-dark:   #c9a200;
    --gold-light:  #fff9d6;
    --white:       #ffffff;
    --off-white:   #f7f8f5;
    --gray-1:      #e8ebe4;
    --gray-2:      #c8cfc0;
    --gray-3:      #8a9680;
    --gray-4:      #4a5442;
    --text:        #1a2418;
    --text-muted:  #4a5442;
    --text-faint:  #8a9680;
    --red:         #c0392b;
    --amber:       #e67e00;
    --teal:        #1a7a6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: var(--off-white);
    color: var(--text);
    font-family: 'Nunito Sans', sans-serif;
    overflow: hidden;
  }

  .screen {
    width: 100vw; height: 100vh;
    display: grid;
    grid-template-rows: 72px 1fr;
    grid-template-columns: 1fr 360px;
    grid-template-areas:
      "topbar  topbar"
      "main    sidebar";
  }

  /* ══════════════════════════════════════
     TOP BAR
  ══════════════════════════════════════ */
  .topbar {
    grid-area: topbar;
    background: var(--green-dark);
    display: flex;
    align-items: center;
    padding: 0 32px;
    gap: 20px;
    position: relative;
    overflow: hidden;
  }

  /* gold accent stripe at very bottom of header */
  .topbar::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  /* SVG shield logo inline */
  .shield-svg {
    width: 38px; height: 44px;
    flex-shrink: 0;
  }

  .school-wordmark {
    display: flex;
    flex-direction: column;
    line-height: 1;
  }

  .school-wordmark .line1 {
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 0.06em;
    color: var(--white);
    text-transform: uppercase;
  }

  .school-wordmark .line2 {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
    margin-top: 1px;
  }

  .topbar-sep {
    width: 1px; height: 28px;
    background: rgba(255,255,255,0.15);
    margin: 0 4px;
  }

  .date-pill {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.03em;
  }

  .block-day-pill {
    background: var(--gold);
    border-radius: 6px;
    padding: 5px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 800;
    color: var(--green-dark);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .clock-group {
    margin-left: auto;
    display: flex;
    align-items: baseline;
    gap: 5px;
  }

  #clock {
    font-family: 'Nunito', monospace;
    font-size: 36px;
    font-weight: 800;
    color: var(--white);
    letter-spacing: -1px;
    line-height: 1;
  }

  #clock-ampm {
    font-size: 14px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.06em;
  }

  /* ══════════════════════════════════════
     MAIN
  ══════════════════════════════════════ */
  .main {
    grid-area: main;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 40px 52px;
    position: relative;
    overflow: hidden;
    background: var(--off-white);
  }

  /* subtle green leaf watermark */
  .main::before {
    content: '';
    position: absolute;
    right: -60px; bottom: -60px;
    width: 420px; height: 420px;
    background: var(--green-light);
    border-radius: 50%;
    opacity: 0.35;
    pointer-events: none;
  }

  .mode-label {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 14px;
  }

  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green-mid);
    
  }



  .event-title-big {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(30px, 4.2vw, 62px);
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.5px;
    color: var(--green-dark);
    margin-bottom: 18px;
    max-width: 840px;
    position: relative; z-index: 1;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 28px;
    position: relative; z-index: 1;
  }

  .meta-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--white);
    border: 1.5px solid var(--gray-1);
    border-radius: 99px;
    padding: 7px 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--text-muted);
  }

  .meta-chip svg { opacity: 0.5; flex-shrink: 0; }

  /* TIME REMAINING */
  .time-block {
    position: relative; z-index: 1;
    margin-bottom: 28px;
  }

  .time-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .time-value {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(52px, 8vw, 104px);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -3px;
    transition: color 0.6s;
  }

  /* progress bar */
  .prog-track {
    margin-top: 14px;
    width: 100%;
    max-width: 680px;
    height: 6px;
    background: var(--gray-1);
    border-radius: 99px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 1s linear, background-color 0.6s;
  }

  /* motivational */
  .motivational {
    position: relative; z-index: 1;
    font-size: 17px;
    font-weight: 600;
    font-style: italic;
    color: var(--text-faint);
    max-width: 600px;
    line-height: 1.55;
    margin-top: 20px;
    padding-left: 16px;
    border-left: 3px solid var(--gold);
    transition: opacity 0.4s;
  }

  /* IDLE STATE */
  .idle-hero {
    font-family: 'Nunito', sans-serif;
    font-size: clamp(22px, 3vw, 44px);
    font-weight: 900;
    color: var(--green-dark);
    margin-bottom: 10px;
    position: relative; z-index: 1;
  }

  .next-teaser {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: var(--white);
    border: 2px solid var(--gray-1);
    border-left: 4px solid var(--gold);
    border-radius: 12px;
    padding: 14px 20px;
    margin-top: 18px;
    max-width: 680px;
    position: relative; z-index: 1;
  }

  .next-lbl {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold-dark);
    white-space: nowrap;
  }

  .next-vdiv { width: 1px; height: 32px; background: var(--gray-1); }

  .next-title { font-size: 16px; font-weight: 700; color: var(--green-dark); margin-bottom: 3px; }
  .next-when  { font-size: 13px; font-weight: 500; color: var(--text-faint); }

  /* ══════════════════════════════════════
     SIDEBAR
  ══════════════════════════════════════ */
  .sidebar {
    grid-area: sidebar;
    background: var(--green-dark);
    border-left: 3px solid var(--gold);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 20px;
    overflow: hidden;
    position: relative;
  }

  /* faint circle decoration */
  .sidebar::after {
    content: '';
    position: absolute;
    bottom: -80px; right: -80px;
    width: 260px; height: 260px;
    border-radius: 50%;
    border: 40px solid rgba(245,200,0,0.06);
    pointer-events: none;
  }

  .sb-label {
    font-size: 9px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    opacity: 0.8;
  }

  /* block schedule */
  .block-list { display: flex; flex-direction: column; gap: 3px; }

  .block-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 0.2s;
  }

  .block-row.current {
    background: rgba(245,200,0,0.12);
    border-color: rgba(245,200,0,0.3);
  }

  .block-row.past { opacity: 0.3; }

  .block-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .block-row.current .block-dot { background: var(--gold); }

  .block-name {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    min-width: 46px;
  }

  .block-time {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
    font-variant-numeric: tabular-nums;
  }

  /* today events */
  .today-list { display: flex; flex-direction: column; gap: 5px; overflow: hidden; flex: 1; }

  .today-card {
    padding: 9px 11px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    transition: background 0.2s;
    flex-shrink: 0;
  }

  .today-card.current {
    background: rgba(245,200,0,0.1);
    border-color: rgba(245,200,0,0.3);
  }

  .today-card-title {
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  .today-card-time {
    font-size: 10px;
    font-weight: 500;
    color: rgba(255,255,255,0.4);
  }

  .no-events {
    font-size: 12px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    padding: 16px 0;
  }





</style>
</head>

const SKIP_DATES = new Set([]);

function getBlockDay(date) {
  const d = new Date(date); d.setHours(0,0,0,0);
  const start = new Date(ROTATION_START); start.setHours(0,0,0,0);
  if (d < start) return null;
  let count = 0;
  const cur = new Date(start);
  while (cur <= d) {
    const dow = cur.getDay();
    const iso = cur.toISOString().slice(0,10);
    if (dow >= 1 && dow <= 5 && !SKIP_DATES.has(iso)) count++;
    cur.setDate(cur.getDate()+1);
  }
  return count === 0 ? null : ((count-1) % 8) + 1;

function parseDate(r) {
  r = r.replace(/\s/g,'');
  if (r.length===8) return new Date(+r.slice(0,4),+r.slice(4,6)-1,+r.slice(6,8));
  const s=r.slice(0,4)+'-'+r.slice(4,6)+'-'+r.slice(6,8)+'T'+r.slice(9,11)+':'+r.slice(11,13)+':'+r.slice(13,15)+(r.endsWith('Z')?'Z':'');
  return new Date(s);
}

const EVENTS = RAW.map(e=>({
  title:e.t, location:e.l, desc:e.d,
  start:parseDate(e.s), end:parseDate(e.e),
  allDay:e.s.length===8
})).sort((a,b)=>a.start-b.start);
// ── MESSAGES ──
const MSG = {
  ending: ["Almost free! Hang in there 🏁","The finish line is RIGHT there.","Last few minutes — you've survived worse.","Nearly done! Don't blow it now 😄","So close. SO close."],
  soon:   ["Getting there! Snacks incoming soon 🍕","Home stretch — you've totally got this.","Just a little more brain power required.","The clock is on your side. Mostly.","Almost time to pack up and look busy."],
  midway: ["Halfway! Reward yourself mentally 🧠","You're in the zone. Or close enough.","Peak focus hours. Probably.","This is going great. Probably.","Keep it up — lunch isn't far off!"],
  early:  ["Fresh period, fresh vibes ✨","The day is young and so are you!","Let's gooo 🚀","Off to a great start — don't jinx it.","New period, new you. Same homework though."],
  idle:   ["Catch your breath — you've earned it ☕","Transitioning like a pro.","Brief intermission. Snacks recommended.","Use this time wisely. Or just stretch.","The hallways are calling 🚶"],
  closing:["That's a wrap! Go touch some grass 🌿","Done for the day! You did it!","School's out — time to decompress 🎉","Another day conquered. Nice work!","See you tomorrow, legend 👋"],
};

let lastPool = null, curMsg = '';

function pickMsg(pool) {
  if (pool !== lastPool) { curMsg = pool[Math.floor(Math.random()*pool.length)]; lastPool = pool; }
  return curMsg;
}

// ── HELPERS ──
function toMins(hhmm) { const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function nowMins() { const n=new Date(); return n.getHours()*60+n.getMinutes()+n.getSeconds()/60; }
function fmtSec(s) {
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.floor(s%60);
  if(h>0) return `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  return `${m}:${String(ss).padStart(2,'0')}`;
}
function fmtTime(d) { return d.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}); }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── CLOCK ──
function updateClock() {
  const n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
  const h12=h%12||12;
  document.getElementById('clock').textContent=`${String(h12).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  document.getElementById('clock-ampm').textContent=h<12?'AM':'PM';
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-display').textContent=`${days[n.getDay()]}  ·  ${months[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
}

// ── SIDEBAR TODAY SCHEDULE ──
function renderTodaySidebar(){
  const el=document.getElementById('today-list');
  const now=new Date();
  const evts=EVENTS.filter(e=>!e.allDay&&sameDay(e.start,now));
  if(!evts.length){el.innerHTML='<div class="no-events">No classes today</div>';return;}
  el.innerHTML=evts.map(e=>{
    const isCur=now>=e.start&&now<e.end;
    const isPast=now>=e.end;
    return `<div class="today-card ${isCur?'current':''}" style="${isPast?'opacity:0.35':''}">
      <div class="today-card-title">${esc(e.title)}</div>
      <div class="today-card-time">${fmtTime(e.start)} – ${fmtTime(e.end)}${e.location&&e.location!=='.'?' · '+esc(e.location):''}</div>
    </div>`;
  }).join('');
}

// ── MAIN RENDER ──
function getActiveBlock(dayNum){
  if(!dayNum||!BLOCK_SCHEDULE[dayNum]) return null;
  const nm=nowMins();
  return BLOCK_SCHEDULE[dayNum].find(p=>nm>=toMins(p.start)&&nm<toMins(p.end))||null;
}
function getActiveEvent(){const now=new Date();return EVENTS.find(e=>!e.allDay&&now>=e.start&&now<e.end)||null;}
function getNextEvent(){const now=new Date();return EVENTS.find(e=>!e.allDay&&e.start>now)||null;}
function getTodayAllDay(){const now=new Date();return EVENTS.filter(e=>e.allDay&&sameDay(e.start,now));}

function colorForMins(m){
  if(m<5)  return {c:'var(--red)',   pool:MSG.ending};
  if(m<15) return {c:'var(--amber)', pool:MSG.soon};
  if(m<35) return {c:'var(--teal)',  pool:MSG.midway};
  return         {c:'var(--green)',  pool:MSG.early};
}

function renderMain(dayNum){
  const now=new Date(), nm=nowMins();
  const area=document.getElementById('main-area');
  const activeEvent=getActiveEvent();
  const activeBlock=getActiveBlock(dayNum);
  const nextEvent=getNextEvent();
  const allDay=getTodayAllDay();

  document.getElementById('block-day-label').textContent=dayNum?`Day ${dayNum}`:'—';

  if(activeEvent){
    const rem=(activeEvent.end-now)/1000;
    const total=(activeEvent.end-activeEvent.start)/1000;
    const pct=Math.min(100,((total-rem)/total)*100);
    const {c,pool}=colorForMins(rem/60);
    const msg=pickMsg(pool);
    area.innerHTML=`
      <div class="mode-label"><span class="live-dot"></span><span style="color:var(--green-mid)">Live Event</span></div>
      <div class="event-title-big">${esc(activeEvent.title)}</div>
      <div class="meta-row">
        <div class="meta-chip">
          <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 1.5"/></svg>
          ${fmtTime(activeEvent.start)} – ${fmtTime(activeEvent.end)}
        </div>
        ${activeEvent.location?`<div class="meta-chip"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M8 1.5C5.5 1.5 3.5 3.5 3.5 6c0 3.5 4.5 8.5 4.5 8.5S12.5 9.5 12.5 6c0-2.5-2-4.5-4.5-4.5z"/><circle cx="8" cy="6" r="1.5"/></svg>${esc(activeEvent.location)}</div>`:''}
      </div>
      <div class="time-block">
        <div class="time-label">Time Remaining</div>
        <div class="time-value" style="color:${c}">${fmtSec(rem)}</div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>
      </div>
      <div class="motivational">${esc(msg)}</div>`;
    return;
  }

  if(activeBlock){
    const bEnd=toMins(activeBlock.end),bStart=toMins(activeBlock.start);
    const rem=Math.max(0,(bEnd-nm)*60);
    const total=(bEnd-bStart)*60;
    const pct=Math.min(100,((total-rem)/total)*100);
    const {c,pool}=colorForMins(rem/60);
    const msg=pickMsg(pool);
    const lbl=activeBlock.name==='Break'?'Morning Break':activeBlock.name==='Lunch'?'Lunch Break':`Period ${activeBlock.name}`;
    area.innerHTML=`
      <div class="mode-label"><span class="live-dot"></span><span style="color:var(--green-mid)">Block in Session · Day ${dayNum}</span></div>
      <div class="event-title-big">${esc(lbl)}</div>
      <div class="meta-row">
        <div class="meta-chip"><svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="8" cy="8" r="6"/><path d="M8 5v3.5l2 1.5"/></svg>${activeBlock.start} – ${activeBlock.end}</div>
      </div>
      <div class="time-block">
        <div class="time-label">Time Remaining</div>
        <div class="time-value" style="color:${c}">${fmtSec(rem)}</div>
        <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${c}"></div></div>
      </div>
      <div class="motivational">${esc(msg)}</div>`;
    return;
  }

  // IDLE
  const isAfter=nm>=15*60;
  const pool=isAfter?MSG.closing:MSG.idle;
  const msg=pickMsg(pool);
  const allDayHtml=allDay.length?`<div class="meta-row">${allDay.map(e=>`<div class="meta-chip">${esc(e.title)}</div>`).join('')}</div>`:'';
  let nextHtml='';
  if(nextEvent){
    const diff=(nextEvent.start-now)/1000/60;
    const when=diff<60?`in ${Math.round(diff)} min`:diff<1440?`Today at ${fmtTime(nextEvent.start)}`:`${nextEvent.start.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${fmtTime(nextEvent.start)}`;
    nextHtml=`<div class="next-teaser">
      <span class="next-lbl">Up next</span>
      <div class="next-vdiv"></div>
      <div>
        <div class="next-title">${esc(nextEvent.title)}</div>
        <div class="next-when">${when}${nextEvent.location?' · '+esc(nextEvent.location):''}</div>
      </div>
    </div>`;
  }
  area.innerHTML=`
    <div class="mode-label"><span class="live-dot" style="background:var(--gray-3)"></span><span style="color:var(--text-faint)">${isAfter?'After School':'Between Blocks'}</span></div>
    <div class="idle-hero">${isAfter?'Great work today, HRS.':'No block in session right now.'}</div>
    ${allDayHtml}
    ${nextHtml}
    <div class="motivational" style="margin-top:22px">${esc(msg)}</div>`;
}

// ── MAIN LOOP ──
function tick(){
  updateClock();
  const now=new Date();
  const dayNum=getBlockDay(now);
  renderMain(dayNum);
  renderTodaySidebar();
}

tick();
setInterval(tick,1000);
</script>
